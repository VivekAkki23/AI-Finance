<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dividend Discount Model (DDM)</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      margin: 0;
      padding: 40px;
      color: #1e293b;
    }

    .container {
      max-width: 850px;
      margin: auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .container:hover {
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    p {
      text-align: center;
      color: #475569;
      margin-bottom: 30px;
      font-size: 15px;
    }

    label {
      display: block;
      margin-top: 18px;
      font-weight: 600;
      color: #334155;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      margin-top: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      outline: none;
      font-size: 15px;
      transition: all 0.3s ease;
      background: #f9fafb;
    }

    input:focus {
      border-color: #2563eb;
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    button {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      border: none;
      padding: 14px 20px;
      margin-top: 30px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    button:hover {
      background: linear-gradient(135deg, #1e40af, #1d4ed8);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.25);
    }

    .result-box {
      margin-top: 30px;
      background: #f9fafb;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }

    .highlight {
      color: #1e40af;
      font-size: 22px;
      font-weight: 700;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💸 Dividend Discount Model (DDM)</h1>
    <p>Estimate a company's intrinsic value based on expected dividends and growth rate.</p>

    <label>🏢 Company Name:</label>
    <input type="text" id="companyName" placeholder="Enter company name (optional)" />

    <label>💰 Expected Dividend Next Year (₹ per share):</label>
    <input type="number" id="dividend" placeholder="e.g., 5" />

    <label>📈 Expected Growth Rate (%):</label>
    <input type="number" id="growth" placeholder="e.g., 6" />

    <label>📉 Required Rate of Return (%):</label>
    <input type="number" id="requiredReturn" placeholder="e.g., 10" />

    <button onclick="calculateDDM()">⚙️ Calculate DDM Value</button>

    <div id="result" class="result-box"></div>

    <div class="footer">AI Valuation Tools © 2025</div>
  </div>

  <script>
    function calculateDDM() {
      const dividend = parseFloat(document.getElementById('dividend').value);
      const growth = parseFloat(document.getElementById('growth').value);
      const requiredReturn = parseFloat(document.getElementById('requiredReturn').value);
      const companyName = document.getElementById('companyName').value || "the company";
      const resultBox = document.getElementById('result');

      if (!dividend || !growth || !requiredReturn) {
        resultBox.innerHTML = "⚠️ Please fill in all fields correctly.";
        return;
      }

      if (requiredReturn <= growth) {
        resultBox.innerHTML = "❌ Growth rate cannot be greater than or equal to required return rate.";
        return;
      }

      const intrinsicValue = dividend * (1 + growth / 100) / ((requiredReturn / 100) - (growth / 100));

      resultBox.innerHTML = `📊 The estimated intrinsic value of <b>${companyName}</b> is <span class="highlight">₹${intrinsicValue.toFixed(2)}</span> per share.`;
    }
  </script>
</body>
</html>
