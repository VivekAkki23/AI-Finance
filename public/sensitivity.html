<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensitivity Analysis Tool</title>
  <style>
  body {
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    margin: 0;
    padding: 40px;
    color: #1e293b;
  }

  .container {
    max-width: 850px;
    margin: auto;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
  }

  .container:hover {
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
  }

  h1 {
    text-align: center;
    color: #1e3a8a;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  p {
    text-align: center;
    color: #475569;
    margin-bottom: 30px;
    font-size: 15px;
  }

  label {
    display: block;
    margin-top: 18px;
    font-weight: 600;
    color: #334155;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    margin-top: 8px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    outline: none;
    font-size: 15px;
    transition: all 0.3s ease;
    background: #f9fafb;
  }

  input:focus {
    border-color: #2563eb;
    background: #ffffff;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  button {
    background: linear-gradient(135deg, #2563eb, #1e40af);
    color: white;
    border: none;
    padding: 14px 20px;
    margin-top: 30px;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
  }

  button:hover {
    background: linear-gradient(135deg, #1e40af, #1d4ed8);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(37, 99, 235, 0.25);
  }

  table {
    width: 100%;
    margin-top: 30px;
    border-collapse: collapse;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
    background: white;
  }

  th, td {
    border: 1px solid #e2e8f0;
    text-align: center;
    padding: 12px;
    font-size: 15px;
  }

  th {
    background: #ffffff; /* white header */
    color: #1e293b;
    font-weight: 600;
  }

  td {
    background: #ffffff; /* white background for cells */
  }

  td:hover {
    background: #fff9c4; /* light yellow highlight for hover */
    transition: 0.3s ease;
  }

  .footer {
    text-align: center;
    margin-top: 30px;
    font-size: 13px;
    color: #94a3b8;
  }
</style>

</head>
<body>
  <div class="container">
    <h1>📊 Sensitivity Analysis Tool</h1>
    <p>Analyze how changes in discount and growth rates impact valuation — powered by AI precision.</p>

    <label>💰 Base Valuation (₹ Cr):</label>
    <input type="number" id="baseValuation" placeholder="Enter your base DCF valuation (₹ Cr)" />

    <label>📉 Discount Rate Range (%):</label>
    <input type="text" id="discountRange" placeholder="e.g., 8,9,10,11,12" />

    <label>📈 Growth Rate Range (%):</label>
    <input type="text" id="growthRange" placeholder="e.g., 2,3,4,5,6" />

    <button onclick="runSensitivity()">⚙️ Run Sensitivity Analysis</button>

    <table id="resultTable"></table>
    <div class="footer">AI Valuation Tools © 2025</div>
  </div>

  <script>
    function runSensitivity() {
      const baseVal = parseFloat(document.getElementById('baseValuation').value);
      const discountRates = document.getElementById('discountRange').value.split(',').map(Number);
      const growthRates = document.getElementById('growthRange').value.split(',').map(Number);
      const table = document.getElementById('resultTable');

      if (!baseVal || discountRates.length === 0 || growthRates.length === 0) {
        alert("⚠️ Please enter all fields correctly!");
        return;
      }

      let html = "<tr><th>Growth ↓ | Discount →</th>";
      discountRates.forEach(dr => html += `<th>${dr}%</th>`);
      html += "</tr>";

      growthRates.forEach(gr => {
        html += `<tr><th>${gr}%</th>`;
        discountRates.forEach(dr => {
          const sensitivityVal = baseVal * (1 + gr/100) / (1 + dr/100);
          html += `<td>₹${sensitivityVal.toFixed(2)} Cr</td>`;
        });
        html += "</tr>";
      });

      table.innerHTML = html;
    }
  </script>
</body>
</html>
